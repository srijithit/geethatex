<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeethaTex | Soft Silk & Kerala Sarees</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    body{font-family:Arial,sans-serif;margin:0;color:#222}
    header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #ddd;position:sticky;top:0;background:#fff}
    h1{font-size:1.25rem;margin:0}.brand{color:#7b1e52}
    button{cursor:pointer;border:1px solid #7b1e52;background:#7b1e52;color:#fff;border-radius:6px;padding:8px 10px}
    .ghost{background:#fff;color:#7b1e52}
    .hero{padding:18px 16px;background:#faf3f7}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;padding:16px}
    .card{border:1px solid #ddd;border-radius:8px;overflow:hidden}
    .card img{width:100%;height:260px;object-fit:cover;background:#eee}
    .card .body{padding:10px}
    .muted{color:#666;font-size:.9rem}
    .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .panel{position:fixed;right:-420px;top:0;bottom:0;width:min(420px,100%);background:#fff;border-left:1px solid #ddd;transition:right .2s;padding:14px;z-index:20;display:flex;flex-direction:column}
    .panel.open{right:0}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:19}
    .overlay.show{display:block}
    .items{flex:1;overflow:auto}
    .item{padding:8px 0;border-bottom:1px solid #eee}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:30}
    .modal.open{display:flex}
    .box{background:#fff;border-radius:8px;padding:14px;width:min(560px,95%)}
    input,select{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;margin:5px 0 10px}
  </style>
</head>
<body>
  <header>
    <h1 class="brand">GeethaTex</h1>
    <div class="row">
      <button class="ghost" id="adminBtn">Admin</button>
      <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
    </div>
  </header>

  <section class="hero">
    <h2>Soft Silk & Kerala Saree Collection</h2>
    <p class="muted">Simple shopping flow with cart, Razorpay payment, and admin dashboard.</p>
  </section>

  <main>
    <div class="row" style="padding:0 16px"><h3>Products</h3><span class="muted" id="count"></span></div>
    <section class="grid" id="products"></section>
  </main>

  <div class="overlay" id="overlay"></div>
  <aside class="panel" id="cartPanel">
    <div class="row"><h3>Cart</h3><button class="ghost" id="closeCart">Close</button></div>
    <div class="items" id="cartItems"></div>
    <p><strong>Total:</strong> ₹<span id="cartTotal">0</span></p>
    <button id="checkoutBtn">Checkout with Razorpay</button>
  </aside>

  <div class="modal" id="checkoutModal">
    <div class="box">
      <h3>Customer Details</h3>
      <label>Name</label><input id="cName" />
      <label>Phone</label><input id="cPhone" />
      <label>Email</label><input id="cEmail" type="email" />
      <div class="row">
        <button class="ghost" id="cancelCheckout">Cancel</button>
        <button id="payBtn">Pay Now</button>
      </div>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="box">
      <div class="row"><h3>Admin Dashboard</h3><button class="ghost" id="closeAdmin">Close</button></div>
      <div id="loginSection">
        <label>PIN</label><input type="password" id="pin" />
        <button id="loginBtn">Login</button>
      </div>
      <div id="dashboard" style="display:none">
        <label>Name</label><input id="pName" />
        <label>Category</label><select id="pCategory"><option>Soft Silk</option><option>Kerala Saree</option></select>
        <label>Price</label><input id="pPrice" type="number" />
        <label>Image URL</label><input id="pImage" />
        <button id="addBtn">Add Product</button>
        <div id="adminList" style="margin-top:8px;max-height:220px;overflow:auto"></div>
      </div>
    </div>
  </div>

  <script>
    const fallbackProducts = [
      {id:'a1',name:'Royal Soft Silk Saree',category:'Soft Silk',price:2899,image:'https://images.unsplash.com/photo-1610030469983-98e550d6193c?auto=format&fit=crop&w=800&q=80'},
      {id:'a2',name:'Classic Kerala Kasavu',category:'Kerala Saree',price:1999,image:'https://images.unsplash.com/photo-1610189019165-4f72f683b0b5?auto=format&fit=crop&w=800&q=80'},
      {id:'a3',name:'Wedding Soft Silk',category:'Soft Silk',price:3499,image:'https://images.unsplash.com/photo-1594271714086-552e4d6d353f?auto=format&fit=crop&w=800&q=80'}
    ];

    const $ = (id) => document.getElementById(id);
    const money = (n) => Number(n).toLocaleString('en-IN');

    let products = JSON.parse(localStorage.getItem('geethatex_products') || 'null') || fallbackProducts;
    let cart = JSON.parse(localStorage.getItem('geethatex_cart') || '[]');
    let token = sessionStorage.getItem('geethatex_admin_token') || '';

    const saveProducts = () => localStorage.setItem('geethatex_products', JSON.stringify(products));
    const saveCart = () => localStorage.setItem('geethatex_cart', JSON.stringify(cart));

    function renderProducts() {
      $('count').textContent = `${products.length} items`;
      $('products').innerHTML = products.map(p => `
        <article class="card">
          <img src="${p.image}" alt="${p.name}" />
          <div class="body">
            <div class="muted">${p.category}</div>
            <strong>${p.name}</strong>
            <div class="row" style="margin-top:8px">
              <span>₹${money(p.price)}</span>
              <button onclick="addToCart('${p.id}')">Add</button>
            </div>
          </div>
        </article>`).join('');
    }

    function renderCart() {
      $('cartCount').textContent = cart.reduce((sum, x) => sum + x.qty, 0);
      $('cartItems').innerHTML = cart.length ? cart.map(c => `
        <div class="item row">
          <div><strong>${c.name}</strong><div class="muted">₹${money(c.price)} × ${c.qty}</div></div>
          <button class="ghost" onclick="removeFromCart('${c.id}')">Remove</button>
        </div>`).join('') : '<p class="muted">Cart is empty.</p>';
      $('cartTotal').textContent = money(cart.reduce((sum, x) => sum + x.price * x.qty, 0));
    }

    window.addToCart = function(id) {
      const existing = cart.find(x => x.id === id);
      if (existing) existing.qty += 1;
      else {
        const p = products.find(x => x.id === id);
        cart.push({ id: p.id, name: p.name, price: p.price, qty: 1 });
      }
      saveCart();
      renderCart();
    }

    window.removeFromCart = function(id) {
      cart = cart.filter(x => x.id !== id);
      saveCart();
      renderCart();
    }

    async function createOrder(customer) {
      const res = await fetch('/api/create-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: cart, customer, notes: { source: 'web' } })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to create order');
      return data;
    }

    async function verifyPayment(payload) {
      const res = await fetch('/api/payment-verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Payment verification failed');
    }

    $('cartBtn').onclick = () => { $('cartPanel').classList.add('open'); $('overlay').classList.add('show'); };
    $('closeCart').onclick = () => { $('cartPanel').classList.remove('open'); $('overlay').classList.remove('show'); };
    $('overlay').onclick = () => { $('cartPanel').classList.remove('open'); $('overlay').classList.remove('show'); };

    $('checkoutBtn').onclick = () => {
      if (!cart.length) return alert('Cart is empty');
      $('checkoutModal').classList.add('open');
    };

    $('cancelCheckout').onclick = () => $('checkoutModal').classList.remove('open');

    $('payBtn').onclick = async () => {
      try {
        const customer = { name: $('cName').value.trim(), phone: $('cPhone').value.trim(), email: $('cEmail').value.trim() };
        if (!customer.name || !customer.phone) return alert('Name and phone are required');

        const order = await createOrder(customer);
        const rz = new Razorpay({
          key: order.key,
          amount: order.amount,
          currency: order.currency,
          name: 'GeethaTex',
          description: 'Saree Purchase',
          order_id: order.id,
          prefill: customer,
          handler: async (resp) => {
            await verifyPayment({ ...resp, orderId: order.id, amount: order.amount, currency: order.currency });
            alert('Payment successful');
            cart = []; saveCart(); renderCart();
            $('checkoutModal').classList.remove('open');
            $('cartPanel').classList.remove('open');
            $('overlay').classList.remove('show');
          }
        });
        rz.on('payment.failed', (e) => alert(e.error.description || 'Payment failed'));
        rz.open();
      } catch (e) {
        alert(e.message || 'Checkout error');
      }
    };

    function renderAdmin() {
      $('adminList').innerHTML = products.map((p, i) => `
        <div class="item row">
          <div><strong>${p.name}</strong><div class="muted">${p.category} • ₹${money(p.price)}</div></div>
          <button class="ghost" onclick="deleteProduct(${i})">Delete</button>
        </div>`).join('');
    }

    async function authCheck() {
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: '{}'
      });
      return res.ok;
    }

    window.deleteProduct = async function(i) {
      if (!(await authCheck())) return alert('Session expired');
      products.splice(i, 1);
      saveProducts();
      renderProducts();
      renderAdmin();
    };

    $('adminBtn').onclick = () => $('adminModal').classList.add('open');
    $('closeAdmin').onclick = () => $('adminModal').classList.remove('open');

    $('loginBtn').onclick = async () => {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: $('pin').value.trim() })
      });
      if (!res.ok) return alert('Invalid PIN');
      const data = await res.json();
      token = data.token;
      sessionStorage.setItem('geethatex_admin_token', token);
      $('loginSection').style.display = 'none';
      $('dashboard').style.display = 'block';
      renderAdmin();
    };

    $('addBtn').onclick = async () => {
      if (!(await authCheck())) return alert('Session expired');
      const p = {
        id: `p_${Date.now()}`,
        name: $('pName').value.trim(),
        category: $('pCategory').value,
        price: Number($('pPrice').value),
        image: $('pImage').value.trim() || 'https://via.placeholder.com/500x650?text=GeethaTex'
      };
      if (!p.name || !p.price) return alert('Enter valid name and price');
      products.unshift(p);
      saveProducts();
      renderProducts();
      renderAdmin();
      $('pName').value = $('pPrice').value = $('pImage').value = '';
    };

    renderProducts();
    renderCart();
    if (token) {
      $('loginSection').style.display = 'none';
      $('dashboard').style.display = 'block';
      renderAdmin();
    }
  </script>
</body>
</html>
